services:
  - type: web
    name: article-api
    runtime: image
    repo: https://github.com/REPLACE_WITH_YOUR_GITHUB_REPO
    plan: free
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: article-api-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: RAILS_LOG_LEVEL
        value: info
      - key: SOLID_QUEUE_IN_PUMA
        value: "true"

databases:
  - name: article-api-db
    plan: free
    region: singapore
